<!DOCTYPE html>
<html lang="zh-CN">

    <title>🖼️ 图片背景去除 - 会员版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: white;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }
        
        .upload-area {
            width: 100%;
            max-width: 600px;
            border: 3px dashed #444;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
            margin-bottom: 30px;
        }
        
        .upload-area:hover {
            border-color: #00d9ff;
            background: rgba(255,255,255,0.1);
        }
        
        .upload-area.dragover {
            border-color: #a855f7;
            background: rgba(168,85,247,0.2);
        }
        
        .upload-area.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2rem;
            color: #ccc;
        }
        
        .upload-hint {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .preview-box {
            text-align: center;
        }
        
        .preview-box h3 {
            margin-bottom: 15px;
            color: #aaa;
            font-size: 1rem;
        }
        
        .preview-img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><rect fill="%23333" width="20" height="20"/><path d="M0 0h20v20H0z" fill-opacity="0.4"/></svg>');
        }
        
        .preview-img.has-bg {
            background-image: none;
        }
        
        .download-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #00d9ff, #a855f7);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }
        
        .download-btn:hover {
            transform: scale(1.05);
        }
        
        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        
        .loading.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            color: #888;
        }
        
        .settings {
            position: fixed;
            top: 20px;
            right: 20px;
        }
        
        .settings-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 10px;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .settings-btn:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        /* 登录和用户面板 */
        .user-panel {
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .user-email {
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .user-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        
        .status-free {
            background: #666;
            color: white;
        }
        
        .status-vip {
            background: linear-gradient(135deg, #f5af17, #f12711);
            color: white;
        }
        
        .credits {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .login-btn, .logout-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
        }
        
        .login-btn {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: #ccc;
        }
        
        /* 会员套餐 */
        .pricing {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
        }
        
        .pricing-title {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ccc;
        }
        
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .pricing-card {
            background: rgba(255,255,255,0.1);
            border: 2px solid #444;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .pricing-card:hover {
            border-color: #00d9ff;
            transform: translateY(-5px);
        }
        
        .pricing-card.current {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.1);
        }
        
        .pricing-card.best {
            border-color: #f5af17;
            position: relative;
        }
        
        .pricing-card.best::before {
            content: '🏆 最值';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f5af17, #f12711);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        
        .plan-name {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .plan-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 5px;
        }
        
        .plan-price span {
            font-size: 0.9rem;
            color: #888;
        }
        
        .plan-credits {
            color: #aaa;
            font-size: 0.85rem;
        }
        
        .buy-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #00d9ff, #a855f7);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .buy-btn:hover {
            transform: scale(1.05);
        }
        
        .hidden {
            display: none !important;
        }
        
        .error-msg {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

            <div class="pricing-card" id="planMonthly">

            <div class="pricing-card best" id="planQuarterly">

            <div class="pricing-card" id="planYearly">

        </div>

        function loadUserFromStorage() {

            }

        // 保存用户到 localStorage
        function saveUser() {
            if (currentUser) {

                delete toSave.accessToken;
                localStorage.setItem('bg_user', JSON.stringify(toSave));
            }
        }
        
        // 更新 UI
        function updateUI() {
            const loginSection = document.getElementById('loginSection');
            const userSection = document.getElementById('userSection');
            const pricingSection = document.getElementById('pricingSection');
            const uploadArea = document.getElementById('uploadArea');
            
            if (!currentUser) {
                // 未登录
                loginSection.classList.remove('hidden');
                userSection.classList.add('hidden');
                pricingSection.classList.add('hidden');
                uploadArea.classList.add('disabled');
                return;
            }
            
            // 已登录
            loginSection.classList.add('hidden');
            userSection.classList.remove('hidden');
            pricingSection.classList.remove('hidden');
            uploadArea.classList.remove('disabled');
            
            // 显示用户信息
            document.getElementById('userAvatar').textContent = currentUser.picture ? '📷' : '👤';
            document.getElementById('userEmail').textContent = currentUser.email;
            
            // 显示用户状态
            const statusEl = document.getElementById('userStatus');
            const creditsEl = document.getElementById('creditsInfo');
            
            if (currentUser.tier === 'vip') {
                statusEl.textContent = 'VIP会员';
                statusEl.className = 'user-status status-vip';
                creditsEl.textContent = '剩余: 无限次';
            } else {
                statusEl.textContent = '免费用户';
                statusEl.className = 'user-status status-free';
                const left = MAX_FREE_CREDITS - (currentUser.used || 0);
                creditsEl.textContent = `剩余: ${left}次`;
            }
            
            // 更新套餐选中状态
            document.querySelectorAll('.pricing-card').forEach(card => card.classList.remove('current'));
            if (currentUser.tier === 'vip') {
                document.getElementById('planYearly').classList.add('current');
            } else {
                document.getElementById('planFree').classList.add('current');
            }
        }
        
        // 退出登录
        function logout() {
            currentUser = null;
            localStorage.removeItem('bg_user');
            if (google.accounts.oauth2) {
                google.accounts.oauth2.revoke();
            }
            updateUI();
            document.getElementById('fileInput').value = '';
            document.getElementById('previewContainer').style.display = 'none';
        }
        
        // 购买套餐（模拟）
        function buyPlan(plan) {
            if (!currentUser) {
                showError('请先登录');
                return;
            }
            
            const confirmMsg = {
                monthly: `确认购买月卡 ¥9.9 (100次)?`,
                quarterly: `确认购买季卡 ¥19.9 (300次)?`,
                yearly: `确认购买年卡 ¥49.9 (无限次)?`

            if (confirm(confirmMsg[plan])) {

                saveUser();
                updateUI();
                alert('购买成功！');
            }
        }

            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 5000);
        }
        
        // 设置面板
